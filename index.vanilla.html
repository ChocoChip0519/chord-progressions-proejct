<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Recommender</title>
<style>
/* ── 리셋 & 기본 ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --border: #2e2e3e;
  --accent: #5b8df6;
  --accent-dim: #3a5fc4;
  --pressed: #f4a942;
  --recommend: #5b8df6;
  --text: #e8e8f0;
  --text-dim: #7a7a9a;
  --green: #4caf7d;
  --red: #e05c5c;
  --radius: 10px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

/* ── 레이아웃 ────────────────────────────── */
#app {
  display: flex; flex-direction: column; height: 100vh;
  max-width: 1100px; margin: 0 auto; padding: 20px 24px 0;
}

/* ── 최상단: 제목 ────────────────────────── */
#title-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
#session-title {
  font-size: 1.45rem; font-weight: 700; color: var(--text);
  background: none; border: none; outline: none; cursor: text;
  border-bottom: 2px solid transparent; padding: 2px 4px;
  transition: border-color .2s;
  flex: 1;
}
#session-title:focus { border-bottom-color: var(--accent); }
#session-title::placeholder { color: var(--text-dim); }

/* ── 장르/비트 설정 바 ───────────────────── */
#settings-bar {
  display: flex; gap: 10px; margin-bottom: 14px; align-items: center;
}
.setting-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; font-size: .82rem;
  color: var(--text-dim); cursor: pointer; transition: all .15s;
  user-select: none;
}
.setting-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.setting-chip:hover:not(.active) { border-color: var(--accent); color: var(--text); }
#settings-bar .label { font-size: .78rem; color: var(--text-dim); margin-right: 2px; }
.sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
#bpm-input {
  width: 64px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 10px; font-size: .82rem;
  color: var(--text); outline: none; text-align: center;
  -moz-appearance: textfield; appearance: textfield;
}
#bpm-input::-webkit-outer-spin-button,
#bpm-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#bpm-input:focus { border-color: var(--accent); }
#mode-badge {
  margin-left: auto; font-size: .75rem; padding: 4px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--surface2);
}

/* ── 히스토리 ────────────────────────────── */
#history-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  min-height: 56px; display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap; margin-bottom: 14px; position: relative;
}
#history-bar .empty-hint {
  color: var(--text-dim); font-size: .82rem;
}
.chord-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 13px; font-size: .9rem; font-weight: 600;
  color: var(--text); position: relative; transition: all .15s;
  cursor: default;
}
.chord-chip.last { border-color: var(--accent); color: var(--accent); }
.chord-chip .idx {
  position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
  font-size: .62rem; color: var(--text-dim); background: var(--surface);
  padding: 0 3px; border-radius: 3px;
}
.arrow-sep { color: var(--text-dim); font-size: .9rem; }

#history-hint {
  position: absolute; right: 12px; bottom: 8px;
  font-size: .72rem; color: var(--text-dim);
}

/* ── 키보드 힌트 바 ──────────────────────── */
#kb-hint {
  display: flex; gap: 16px; margin-bottom: 10px;
  font-size: .74rem; color: var(--text-dim);
}
#kb-hint span { display: flex; align-items: center; gap: 4px; }
.kb { background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-family: monospace; color: var(--text); }

/* ── 피아노 래퍼 ─────────────────────────── */
#piano-wrapper {
  flex: 1; display: flex; flex-direction: column;
  justify-content: flex-end; padding-bottom: 24px; position: relative;
}

/* ── 현재 눌린 코드 표시 ──────────────────── */
#current-chord-display {
  text-align: center; margin-bottom: 8px;
  font-size: 1.1rem; font-weight: 700; color: var(--pressed);
  min-height: 1.6rem; letter-spacing: .5px;
}

/* ── 피아노 건반 ─────────────────────────── */
#piano {
  position: relative; display: flex;
  height: 180px; user-select: none;
  border-radius: 0 0 10px 10px; overflow: hidden;
  border: 1px solid var(--border);
}
.white-key {
  flex: 1; background: #f5f5f0;
  border-right: 1px solid #bbb;
  border-radius: 0 0 6px 6px;
  position: relative; cursor: pointer;
  transition: background .05s;
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding-bottom: 6px;
}
.white-key:last-child { border-right: none; }
.white-key:active, .white-key.pressed { background: var(--pressed) !important; }
.white-key.recommend-note { background: #c8daff !important; }
.white-key.pressed.recommend-note { background: var(--pressed) !important; }
.white-key .key-label {
  font-size: .62rem; color: #666; font-weight: 600;
  pointer-events: none; line-height: 1;
}
.white-key .note-label {
  font-size: .58rem; color: #999; pointer-events: none; line-height: 1.2;
}

.black-key {
  position: absolute; top: 0;
  width: 7%; height: 60%; background: #1a1a1a;
  border-radius: 0 0 5px 5px; z-index: 2; cursor: pointer;
  transition: background .05s;
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding-bottom: 5px;
}
.black-key:active, .black-key.pressed { background: #c8860a !important; }
.black-key.recommend-note { background: #3a5fc4 !important; }
.black-key.pressed.recommend-note { background: #c8860a !important; }
.black-key .key-label { font-size: .55rem; color: #aaa; pointer-events: none; }
.black-key .note-label { font-size: .5rem; color: #777; pointer-events: none; }

/* ── 추천 팝업 ───────────────────────────── */
#recommend-popup {
  position: absolute; bottom: calc(180px + 32px);
  left: 50%; transform: translateX(-50%);
  display: none; flex-direction: column; align-items: center;
  z-index: 100; gap: 8px;
}
#recommend-popup.show { display: flex; }

#popup-label {
  font-size: .75rem; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 12px;
}

#cards-row {
  display: flex; gap: 10px; align-items: stretch;
}
.nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-dim); font-size: 1rem;
  width: 28px; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }

.chord-card {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: 12px; padding: 10px 12px; cursor: pointer;
  transition: all .15s; min-width: 110px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.chord-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.chord-card.selected { border-color: var(--green); background: #1a2e20; }
.chord-card .card-name {
  font-size: 1.05rem; font-weight: 700; color: var(--text);
}
.chord-card .card-score {
  font-size: .65rem; color: var(--text-dim);
}
.chord-card .play-btn {
  font-size: .7rem; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 2px 8px; color: var(--accent); cursor: pointer;
  transition: all .15s;
}
.chord-card .play-btn:hover { background: var(--accent); color: #fff; }

/* 미니 건반 */
.mini-piano {
  position: relative; display: flex;
  height: 48px; width: 100%;
}
.mini-white {
  flex: 1; background: #f0f0ec; border-right: 1px solid #bbb;
  border-radius: 0 0 3px 3px; cursor: pointer;
  position: relative; transition: background .05s;
  display: flex; flex-direction: column; justify-content: flex-end;
  align-items: center; padding-bottom: 2px;
}
.mini-white:last-child { border-right: none; }
.mini-white.hi { background: #c8daff !important; }
.mini-white.pressed { background: var(--pressed) !important; }
.mini-white .mini-lbl { font-size: .45rem; color: #888; pointer-events: none; }
.mini-black {
  position: absolute; top: 0; width: 11%; height: 58%;
  background: #1a1a1a; border-radius: 0 0 3px 3px; z-index: 2; cursor: pointer;
  transition: background .05s;
}
.mini-black.hi { background: #3a5fc4 !important; }
.mini-black.pressed { background: #c8860a !important; }

/* ── ESC 닫기 힌트 ───────────────────────── */
#popup-close-hint {
  font-size: .7rem; color: var(--text-dim);
}

/* ── 스크롤바 ────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- 제목 -->
  <div id="title-bar">
    <input id="session-title" placeholder="제목을 입력하세요 (클릭하여 수정)" value="New Chord Progression">
  </div>

  <!-- 장르 / 비트 -->
  <div id="settings-bar">
    <span class="label">장르</span>
    <span class="setting-chip active" data-genre="pop">Pop</span>
    <span class="setting-chip" data-genre="rnb" style="opacity:.45;cursor:not-allowed" title="준비 중">R&B</span>
    <span class="setting-chip" data-genre="ballad" style="opacity:.45;cursor:not-allowed" title="준비 중">발라드</span>
    <span class="setting-chip" data-genre="rock" style="opacity:.45;cursor:not-allowed" title="준비 중">Rock</span>
    <div class="sep"></div>
    <span class="label">BPM</span>
    <input id="bpm-input" type="number" min="40" max="300" value="120" step="1">
    <div id="mode-badge">장조 / 단조 자동감지</div>
  </div>

  <!-- 히스토리 -->
  <div id="history-bar">
    <span class="empty-hint" id="history-empty">확정된 코드가 여기에 표시됩니다 — Enter로 확정, Backspace로 삭제</span>
    <span id="history-hint">← → 로 코드 탐색</span>
  </div>

  <!-- 키보드 힌트 -->
  <div id="kb-hint">
    <span><span class="kb">Enter</span> 코드 확정</span>
    <span><span class="kb">⌫</span> 마지막 코드 삭제</span>
    <span><span class="kb">→</span> 추천 받기</span>
    <span><span class="kb">Esc</span> 팝업 닫기</span>
    <span><span class="kb">A–K</span> 흰 건반 &nbsp;<span class="kb">W E T Y U</span> 검은 건반</span>
  </div>

  <!-- 현재 코드 표시 -->
  <div id="piano-wrapper">
    <div id="current-chord-display"></div>

    <!-- 추천 팝업 -->
    <div id="recommend-popup">
      <div id="popup-label">다음 코드 추천 <span id="popup-count"></span></div>
      <div id="cards-row">
        <button class="nav-btn" id="btn-prev">‹</button>
        <div id="cards-inner"></div>
        <button class="nav-btn" id="btn-next">›</button>
      </div>
      <div id="popup-close-hint">카드 클릭으로 확정 · Esc로 닫기</div>
    </div>

    <!-- 피아노 -->
    <div id="piano"></div>
  </div>

</div>

<script>
// ════════════════════════════════════════════
// 1. 음이론 데이터
// ════════════════════════════════════════════
const NOTES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// 코드 이름 → 구성음 (미디 피치, 옥타브4 기준)
// 공식: root MIDI + 인터벌
const INTERVALS = {
  '':     [0,4,7],       // major triad
  'm':    [0,3,7],       // minor triad
  '7':    [0,4,7,10],    // dominant 7
  'maj7': [0,4,7,11],
  'm7':   [0,3,7,10],
  'dim':  [0,3,6],
  'aug':  [0,4,8],
  'sus2': [0,2,7],
  'sus4': [0,5,7],
  '9':    [0,4,7,10,14],
  'maj9': [0,4,7,11,14],
  'm9':   [0,3,7,10,14],
  'add9': [0,4,7,14],
};

// 근음 이름 → 반음 인덱스
function noteIndex(name) {
  let i = NOTES_SHARP.indexOf(name);
  if (i < 0) i = NOTES_FLAT.indexOf(name);
  return i; // 0~11
}

// 코드명 파싱 → { root, quality, notes[] }
// notes[]는 MIDI 번호 (C4=60)
function parseChord(chordName) {
  // 근음 파싱 (C, C#, Db ...)
  const m = chordName.match(/^([A-G][b#]?)(.*)/);
  if (!m) return null;
  const root    = m[1];
  const quality = m[2] || '';
  const rootIdx = noteIndex(root);
  if (rootIdx < 0) return null;
  const intervals = INTERVALS[quality] ?? INTERVALS[''];
  const rootMidi  = 60 + rootIdx; // C4
  const notes     = intervals.map(iv => {
    let n = rootMidi + iv;
    if (n > 72) n -= 12; // 옥타브 내 유지
    return n;
  });
  return { root, quality, notes, name: chordName };
}

// MIDI 번호 → 음이름
function midiToName(midi) {
  return NOTES_SHARP[midi % 12];
}

// ════════════════════════════════════════════
// 2. 추천 데이터 (chordData.js 인라인)
// ════════════════════════════════════════════
const transitions = {
  major: {
    I:    { vi:22, V:12, IV:18, ii:8 },
    vi:   { IV:25, ii:10, I:8, V:6 },
    IV:   { V:28, I:12, vi:8, ii:6 },
    V:    { I:30, vi:10, IV:5, ii:3 },
    ii:   { V:24, I:8, IV:6, vi:4 },
  },
  minor: {
    i:   { VI:28, III:18, VII:16, v:10, iv:8, V:6 },
    VI:  { III:20, VII:16, i:12, iv:8, V:5 },
    III: { VII:22, i:14, VI:10, iv:6, V:4 },
    VII: { i:24, VI:14, III:10, iv:5, V:4 },
    V:   { i:20, VI:8, VII:6, iv:4 },
    v:   { i:16, VI:8, VII:6 },
    iv:  { i:12, VII:10, V:8, VI:6 },
  },
};

// 패턴 (도수 → 실제 코드 예시 매핑은 조성에 따라 계산)
const patterns = [
  { id:'P01', relative:['I','vi','IV','V'], type:'major', weight:100 },
  { id:'P02', relative:['I','V','vi','IV'], type:'major', weight:60 },
  { id:'P03', relative:['I','vi','ii','V'], type:'major', weight:55 },
  { id:'P06', relative:['i','VI','III','VII'], type:'minor', weight:100 },
  { id:'P07', relative:['i','VII','VI','V'],   type:'minor', weight:65 },
  { id:'P08', relative:['i','v','VI','VII'],   type:'minor', weight:55 },
];

// 도수 → 실제 코드 이름 변환 (조성 기준)
// 장조 스케일 반음 간격: 0,2,4,5,7,9,11
const MAJOR_SCALE = [0,2,4,5,7,9,11];
// 단조 스케일: 0,2,3,5,7,8,10
const MINOR_SCALE = [0,2,3,5,7,8,10];

const DEGREE_IDX = {
  major: { I:0, ii:1, iii:2, IV:3, V:4, vi:5, 'vii°':6 },
  minor: { i:0,'ii°':1, III:2, iv:3, v:4, VI:5, VII:6, V:4 },
};
const DEGREE_QUALITY = {
  major: { I:'', ii:'m', iii:'m', IV:'', V:'', vi:'m', 'vii°':'dim' },
  minor: { i:'m','ii°':'dim', III:'', iv:'m', v:'m', VI:'', VII:'', V:'' },
};

function degreeToChord(degree, tonicMidi, mode) {
  const scale  = mode === 'major' ? MAJOR_SCALE : MINOR_SCALE;
  const idxMap = DEGREE_IDX[mode];
  const qualMap= DEGREE_QUALITY[mode];
  const idx    = idxMap[degree];
  if (idx === undefined) return null;
  const semitone = scale[idx];
  const rootMidi = ((tonicMidi + semitone - 60 + 12) % 12) + 60;
  const rootName = NOTES_SHARP[rootMidi % 12];
  const quality  = qualMap[degree] ?? '';
  return rootName + quality;
}

// ════════════════════════════════════════════
// 3. 추천 엔진
// ════════════════════════════════════════════

// 스택 (자료구조)
class ChordHistoryStack {
  #stack = [];
  push(c) { this.#stack.push(c); }
  pop()   { return this.#stack.pop() ?? null; }
  peek()  { return this.#stack.at(-1) ?? null; }
  toArray() { return [...this.#stack]; }
  get size() { return this.#stack.length; }
  clear() { this.#stack = []; }
}

// 현재까지의 도수 히스토리에서 다음 도수 후보 추출
function getNextDegreeCandidates(historyChords, mode) {
  const transTable = transitions[mode] ?? {};
  const modePatterns = patterns.filter(p => p.type === mode);
  const scoreMap = {};

  // 전이 테이블 기반
  const last = historyChords.at(-1);
  if (last && transTable[last]) {
    for (const [next, freq] of Object.entries(transTable[last])) {
      scoreMap[next] = (scoreMap[next] ?? 0) + freq * 2;
    }
  }

  // 패턴 매칭 기반
  for (const pat of modePatterns) {
    const prog = pat.relative;
    const len  = historyChords.length;
    for (let start = 0; start <= prog.length - 1; start++) {
      const windowSize = Math.min(len, prog.length - start);
      const histSlice  = historyChords.slice(-windowSize);
      const progSlice  = prog.slice(start, start + windowSize);
      if (histSlice.every((d, i) => d === progSlice[i])) {
        const nextIdx = start + windowSize;
        const nextDeg = nextIdx < prog.length ? prog[nextIdx] : prog[0];
        scoreMap[nextDeg] = (scoreMap[nextDeg] ?? 0) + pat.weight;
        break;
      }
    }
  }

  return Object.entries(scoreMap)
    .map(([degree, score]) => ({ degree, score: Math.round(score) }))
    .sort((a, b) => b.score - a.score);
}

// 코드명을 도수로 역변환 (단순: C장조/Am단조 두 기준)
// 실제론 조성 감지 필요하지만 prototype은 자동 감지로 처리
function chordToDegree(chordName, tonicMidi, mode) {
  const scale  = mode === 'major' ? MAJOR_SCALE : MINOR_SCALE;
  const qualMap= DEGREE_QUALITY[mode];
  const parsed = parseChord(chordName);
  if (!parsed) return null;
  const rootOffset = (noteIndex(parsed.root) - (tonicMidi % 12) + 12) % 12;
  const idx = scale.indexOf(rootOffset);
  if (idx < 0) return null;
  return Object.keys(DEGREE_IDX[mode]).find(d => DEGREE_IDX[mode][d] === idx) ?? null;
}

// ════════════════════════════════════════════
// 4. Web Audio 음 합성
// ════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function playNote(midi, duration = 0.9, vol = 0.28) {
  const ctx   = getAudioCtx();
  const osc   = ctx.createOscillator();
  const gain  = ctx.createGain();
  const now   = ctx.currentTime;

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(midiToFreq(midi), now);

  // 하모닉 보강
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(midiToFreq(midi + 12), now);
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(vol * 0.4, now);
  osc2.connect(gain2); gain2.connect(ctx.destination);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + duration);
  osc2.start(now); osc2.stop(now + duration);
}

function playChord(midiNotes, duration = 1.2) {
  midiNotes.forEach(n => playNote(n, duration));
}

// ════════════════════════════════════════════
// 5. 피아노 건반 생성
//    C4 ~ B5  (2옥타브, 흰건반 14개)
//    키보드: A~K → 흰건반, W E T Y U → 검은건반
// ════════════════════════════════════════════
// 흰건반 MIDI (C4=60 ~ B5=83)
const WHITE_MIDI = [60,62,64,65,67,69,71, 72,74,76,77,79,81,83];
// 검은건반 MIDI & 위치 (흰건반 사이 %)
// 인덱스: 흰건반 중 몇 번째 뒤에 오는지, leftPct: 전체 건반 폭 기준 left%
const BLACK_DEFS = [
  {midi:61, afterWhite:0},  // C#
  {midi:63, afterWhite:1},  // D#
  {midi:66, afterWhite:3},  // F#
  {midi:68, afterWhite:4},  // G#
  {midi:70, afterWhite:5},  // A#
  {midi:73, afterWhite:7},  // C#5
  {midi:75, afterWhite:8},  // D#5
  {midi:78, afterWhite:10}, // F#5
  {midi:80, afterWhite:11}, // G#5
  {midi:82, afterWhite:12}, // A#5
];

const WHITE_KEYS = ['a','s','d','f','g','h','j','k','l',';',"'",'z','x','c'];
const BLACK_KEYS_KB = ['w','e','','t','y','u','','i','o',''];

// 현재 눌린 음 집합
const pressedMidi = new Set();
// 추천 하이라이트 음 집합
const recommendMidi = new Set();

function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';
  const total = WHITE_MIDI.length;

  // 흰건반
  WHITE_MIDI.forEach((midi, i) => {
    const key = document.createElement('div');
    key.className = 'white-key';
    key.dataset.midi = midi;
    const kb = WHITE_KEYS[i] ?? '';
    key.innerHTML = `<span class="note-label">${midiToName(midi)}</span>`;
    key.addEventListener('mousedown', e => { e.preventDefault(); pressKey(midi); });
    key.addEventListener('mouseup',   () => releaseKey(midi));
    key.addEventListener('mouseleave',() => releaseKey(midi));
    piano.appendChild(key);
  });

  // 검은건반 (position: absolute)
  const whiteW = 100 / total; // 흰건반 1개 폭(%)
  BLACK_DEFS.forEach((bd, i) => {
    const key = document.createElement('div');
    key.className = 'black-key';
    key.dataset.midi = bd.midi;
    const leftPct = (bd.afterWhite + 1) * whiteW - 3.5;
    key.style.left = leftPct + '%';
    const kb = BLACK_KEYS_KB[i] ?? '';
    key.innerHTML = `<span class="key-label">${kb.toUpperCase()}</span><span class="note-label">${midiToName(bd.midi)}#</span>`;
    key.addEventListener('mousedown', e => { e.preventDefault(); pressKey(bd.midi); });
    key.addEventListener('mouseup',   () => releaseKey(bd.midi));
    key.addEventListener('mouseleave',() => releaseKey(bd.midi));
    piano.appendChild(key);
  });
}

function getKeyEl(midi) {
  return document.querySelector(`#piano [data-midi="${midi}"]`);
}

function pressKey(midi) {
  pressedMidi.add(midi);
  const el = getKeyEl(midi);
  if (el) el.classList.add('pressed');
  playNote(midi, 1.5);
  updateCurrentChordDisplay();
}

function releaseKey(midi) {
  pressedMidi.delete(midi);
  const el = getKeyEl(midi);
  if (el) el.classList.remove('pressed');
  updateCurrentChordDisplay();
}

function updateCurrentChordDisplay() {
  const disp = document.getElementById('current-chord-display');
  if (pressedMidi.size === 0) { disp.textContent = ''; return; }
  const names = [...pressedMidi].sort((a,b)=>a-b).map(midiToName);
  disp.textContent = '♩ ' + names.join(' + ');
}

function highlightRecommend(midiSet) {
  // 기존 추천 제거
  document.querySelectorAll('#piano .recommend-note').forEach(el => el.classList.remove('recommend-note'));
  recommendMidi.clear();
  midiSet.forEach(midi => {
    recommendMidi.add(midi);
    const el = getKeyEl(midi);
    if (el) el.classList.add('recommend-note');
  });
}

// ════════════════════════════════════════════
// 6. 히스토리 스택 & 도수 추적
// ════════════════════════════════════════════
const historyStack = new ChordHistoryStack();  // { name, midi[] }
const degreeStack  = new ChordHistoryStack();  // 도수 문자열

let currentMode  = 'minor'; // 자동 감지
let currentTonic = 69;      // A (Am = 기본)

// 조성 자동 감지 (단순: 첫 코드 기준)
function detectMode(chordName) {
  const parsed = parseChord(chordName);
  if (!parsed) return;
  if (parsed.quality === 'm' || parsed.quality === 'm7' || parsed.quality === 'm9') {
    currentMode  = 'minor';
    currentTonic = 60 + noteIndex(parsed.root);
  } else {
    currentMode  = 'major';
    currentTonic = 60 + noteIndex(parsed.root);
  }
  document.getElementById('mode-badge').textContent =
    currentMode === 'major' ? '장조 (Major)' : '단조 (Minor)';
}

function confirmChord() {
  if (pressedMidi.size === 0) return;

  const sorted = [...pressedMidi].sort((a,b)=>a-b);
  const names  = sorted.map(midiToName);

  // 코드명 추측 (근음 + 인터벌)
  const rootMidi   = sorted[0];
  const rootName   = midiToName(rootMidi);
  const intervals  = sorted.map(n => (n - rootMidi + 12) % 12);
  let quality = '';
  if (JSON.stringify(intervals) === JSON.stringify([0,4,7]))   quality = '';
  else if (JSON.stringify(intervals) === JSON.stringify([0,3,7])) quality = 'm';
  else if (JSON.stringify(intervals) === JSON.stringify([0,4,7,10])) quality = '7';
  else if (JSON.stringify(intervals) === JSON.stringify([0,4,7,11])) quality = 'maj7';
  else if (JSON.stringify(intervals) === JSON.stringify([0,3,7,10])) quality = 'm7';
  else quality = '?';

  const chordName = rootName + quality;

  // 첫 코드면 조성 감지
  if (historyStack.size === 0) detectMode(chordName);

  // 도수 추적
  const degree = chordToDegree(chordName, currentTonic, currentMode) ?? '?';

  historyStack.push({ name: chordName, midi: sorted });
  degreeStack.push(degree);

  renderHistory();
  closePopup();

  // 키 해제
  [...pressedMidi].forEach(m => releaseKey(m));
}

function undoChord() {
  historyStack.pop();
  degreeStack.pop();
  if (historyStack.size === 0) {
    currentMode = 'minor'; currentTonic = 69;
    document.getElementById('mode-badge').textContent = '장조 / 단조 자동감지';
  }
  renderHistory();
  closePopup();
}

function renderHistory() {
  const bar   = document.getElementById('history-bar');
  const empty = document.getElementById('history-empty');
  const hint  = document.getElementById('history-hint');
  const arr   = historyStack.toArray();

  // 칩 제거
  bar.querySelectorAll('.chord-chip, .arrow-sep').forEach(el => el.remove());

  if (arr.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  arr.forEach((item, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'arrow-sep'; sep.textContent = '→';
      bar.insertBefore(sep, hint);
    }
    const chip = document.createElement('div');
    chip.className = 'chord-chip' + (i === arr.length-1 ? ' last' : '');
    const idxSpan = document.createElement('span');
    idxSpan.className = 'idx'; idxSpan.textContent = i + 1;
    chip.appendChild(idxSpan);
    chip.appendChild(document.createTextNode(item.name));
    bar.insertBefore(chip, hint);
  });
}

// ════════════════════════════════════════════
// 7. 추천 팝업
// ════════════════════════════════════════════
let allCandidates = [];  // 전체 후보 (도수 + 변형 포함)
let popupPage = 0;
const PAGE_SIZE = 4;

// 도수 → 변형 코드 배열 (기본 + 7th + maj7 등)
function degreeToVariants(degree, tonicMidi, mode) {
  const base = degreeToChord(degree, tonicMidi, mode);
  if (!base) return [];
  const root = base.replace(/m$|maj7$|7$|dim$|aug$/, '').replace(/m7$/, '');
  // 파싱으로 근음 추출
  const parsed = parseChord(base);
  if (!parsed) return [base];
  const r = parsed.root;
  const isMajorDeg = !['i','ii°','iv','v'].includes(degree) && !['m','dim'].includes(parsed.quality);

  if (isMajorDeg || parsed.quality === '') {
    return [r, r+'maj7', r+'7', r+'sus4', r+'add9'];
  } else {
    return [r+'m', r+'m7', r+'m9', r+'7'];
  }
}

function openRecommendPopup() {
  const degArr = degreeStack.toArray();
  if (degArr.length === 0) {
    // 첫 코드 추천: 단조 기본 패턴
    allCandidates = [
      { degree:'i',   score:100, variants: degreeToVariants('i',  currentTonic, 'minor') },
      { degree:'I',   score:90,  variants: degreeToVariants('I',  currentTonic, 'major') },
      { degree:'VI',  score:70,  variants: degreeToVariants('VI', currentTonic, 'minor') },
      { degree:'IV',  score:65,  variants: degreeToVariants('IV', currentTonic, 'major') },
    ];
  } else {
    const raw = getNextDegreeCandidates(degArr, currentMode);
    allCandidates = raw.map(c => ({
      degree:   c.degree,
      score:    c.score,
      variants: degreeToVariants(c.degree, currentTonic, currentMode),
    }));
  }

  popupPage = 0;
  renderPopupCards();
  document.getElementById('recommend-popup').classList.add('show');
}

function closePopup() {
  document.getElementById('recommend-popup').classList.remove('show');
  highlightRecommend(new Set());
}

function renderPopupCards() {
  const inner = document.getElementById('cards-inner');
  inner.style.display = 'flex'; inner.style.gap = '10px';
  inner.innerHTML = '';

  const total = allCandidates.length;
  document.getElementById('popup-count').textContent =
    total > 0 ? `(${total}개)` : '';

  const page = allCandidates.slice(popupPage * PAGE_SIZE, (popupPage+1) * PAGE_SIZE);

  page.forEach(cand => {
    const mainChord = cand.variants[0] ?? cand.degree;
    const parsed    = parseChord(mainChord);
    const notes     = parsed?.notes ?? [];

    const card = document.createElement('div');
    card.className = 'chord-card';

    // 코드명
    const nameEl = document.createElement('div');
    nameEl.className = 'card-name'; nameEl.textContent = mainChord;
    card.appendChild(nameEl);

    // 점수
    const scoreEl = document.createElement('div');
    scoreEl.className = 'card-score';
    scoreEl.textContent = `빈도점수 ${cand.score}`;
    card.appendChild(scoreEl);

    // [방식 A] 즉시 재생 버튼
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.textContent = '▶ 즉시 재생';
    playBtn.addEventListener('click', e => {
      e.stopPropagation();
      playChord(notes);
    });
    card.appendChild(playBtn);

    // [방식 B] 미니 건반
    const miniPiano = buildMiniPiano(notes);
    card.appendChild(miniPiano);

    // 변형 코드 버튼들
    if (cand.variants.length > 1) {
      const varRow = document.createElement('div');
      varRow.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;justify-content:center';
      cand.variants.forEach(v => {
        const vb = document.createElement('button');
        vb.style.cssText = 'font-size:.65rem;padding:2px 6px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer';
        vb.textContent = v;
        vb.addEventListener('click', e => {
          e.stopPropagation();
          // 미니 건반 업데이트 + 재생
          const p2 = parseChord(v);
          if (p2) {
            playChord(p2.notes);
            nameEl.textContent = v;
            updateMiniPiano(miniPiano, p2.notes);
            card.dataset.selectedChord = v;
            card.dataset.selectedMidi  = JSON.stringify(p2.notes);
          }
        });
        varRow.appendChild(vb);
      });
      card.appendChild(varRow);
    }

    card.dataset.selectedChord = mainChord;
    card.dataset.selectedMidi  = JSON.stringify(notes);

    // 카드 클릭 → 확정
    card.addEventListener('click', () => confirmFromCard(card));

    // hover → 건반 하이라이트
    card.addEventListener('mouseenter', () => {
      const midi = JSON.parse(card.dataset.selectedMidi ?? '[]');
      highlightRecommend(new Set(midi));
    });
    card.addEventListener('mouseleave', () => highlightRecommend(new Set()));

    inner.appendChild(card);
  });

  document.getElementById('btn-prev').disabled = popupPage === 0;
  document.getElementById('btn-next').disabled = (popupPage+1)*PAGE_SIZE >= allCandidates.length;
}

function confirmFromCard(card) {
  const chordName = card.dataset.selectedChord;
  const midiNotes = JSON.parse(card.dataset.selectedMidi ?? '[]');
  if (!chordName) return;

  if (historyStack.size === 0) detectMode(chordName);
  const degree = chordToDegree(chordName, currentTonic, currentMode) ?? '?';
  historyStack.push({ name: chordName, midi: midiNotes });
  degreeStack.push(degree);

  playChord(midiNotes);
  renderHistory();
  closePopup();
}

// ── 미니 건반 빌더 ────────────────────────
// C4~B4 (1옥타브) 기준
const MINI_WHITE = [60,62,64,65,67,69,71];
const MINI_BLACK_DEFS = [
  {midi:61, afterWhite:0},
  {midi:63, afterWhite:1},
  {midi:66, afterWhite:3},
  {midi:68, afterWhite:4},
  {midi:70, afterWhite:5},
];

function buildMiniPiano(highlightMidi) {
  const wrap = document.createElement('div');
  wrap.className = 'mini-piano';
  const hiSet = new Set(highlightMidi.map(m => m % 12));

  const total = MINI_WHITE.length;
  MINI_WHITE.forEach((midi, i) => {
    const k = document.createElement('div');
    k.className = 'mini-white' + (hiSet.has(midi%12) ? ' hi' : '');
    k.dataset.midi12 = midi % 12;
    k.addEventListener('mousedown', e => { e.stopPropagation(); playNote(midi); k.classList.add('pressed'); });
    k.addEventListener('mouseup',   () => k.classList.remove('pressed'));
    k.addEventListener('mouseleave',() => k.classList.remove('pressed'));
    const lbl = document.createElement('span');
    lbl.className = 'mini-lbl'; lbl.textContent = midiToName(midi);
    k.appendChild(lbl);
    wrap.appendChild(k);
  });

  const whiteW = 100 / total;
  MINI_BLACK_DEFS.forEach(bd => {
    const k = document.createElement('div');
    k.className = 'mini-black' + (hiSet.has(bd.midi%12) ? ' hi' : '');
    k.dataset.midi12 = bd.midi % 12;
    k.style.left = ((bd.afterWhite + 1) * whiteW - 5) + '%';
    k.addEventListener('mousedown', e => { e.stopPropagation(); playNote(bd.midi); k.classList.add('pressed'); });
    k.addEventListener('mouseup',   () => k.classList.remove('pressed'));
    k.addEventListener('mouseleave',() => k.classList.remove('pressed'));
    wrap.appendChild(k);
  });

  return wrap;
}

function updateMiniPiano(wrap, highlightMidi) {
  const hiSet = new Set(highlightMidi.map(m => m % 12));
  wrap.querySelectorAll('.mini-white, .mini-black').forEach(el => {
    const m12 = parseInt(el.dataset.midi12);
    const isHi = hiSet.has(m12);
    if (el.classList.contains('mini-white')) {
      el.classList.toggle('hi', isHi);
    } else {
      el.classList.toggle('hi', isHi);
    }
  });
}

// ════════════════════════════════════════════
// 8. 키보드 입력
// ════════════════════════════════════════════
// 흰건반 키 → MIDI 매핑
const KB_WHITE_MAP = {};
WHITE_KEYS.forEach((k, i) => { if (k) KB_WHITE_MAP[k] = WHITE_MIDI[i]; });

// 검은건반 키 → MIDI
const KB_BLACK_MAP = {};
['w','e','t','y','u'].forEach((k, i) => {
  const bd = [61,63,66,68,70][i];
  if (bd) KB_BLACK_MAP[k] = bd;
});
// 2옥타브 확장
['i','o'].forEach((k, i) => {
  KB_BLACK_MAP[k] = [73,75][i];
});

const kbPressed = new Set();

document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('session-title')) return;
  if (e.repeat) return;

  const key = e.key.toLowerCase();

  // 피아노 키
  if (KB_WHITE_MAP[key] !== undefined && !kbPressed.has(key)) {
    kbPressed.add(key);
    pressKey(KB_WHITE_MAP[key]);
    return;
  }
  if (KB_BLACK_MAP[key] !== undefined && !kbPressed.has(key)) {
    kbPressed.add(key);
    pressKey(KB_BLACK_MAP[key]);
    return;
  }

  // 기능 키
  if (e.key === 'Enter')      { e.preventDefault(); confirmChord(); }
  if (e.key === 'Backspace')  { e.preventDefault(); undoChord(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); openRecommendPopup(); }
  if (e.key === 'Escape')     closePopup();
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if (KB_WHITE_MAP[key] !== undefined) { kbPressed.delete(key); releaseKey(KB_WHITE_MAP[key]); }
  if (KB_BLACK_MAP[key] !== undefined) { kbPressed.delete(key); releaseKey(KB_BLACK_MAP[key]); }
});

// ════════════════════════════════════════════
// 9. UI 이벤트
// ════════════════════════════════════════════

// 페이지 버튼
document.getElementById('btn-prev').addEventListener('click', () => {
  if (popupPage > 0) { popupPage--; renderPopupCards(); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if ((popupPage+1)*PAGE_SIZE < allCandidates.length) { popupPage++; renderPopupCards(); }
});

// 팝업 외부 클릭 닫기
document.addEventListener('mousedown', e => {
  const popup = document.getElementById('recommend-popup');
  if (!popup.contains(e.target) && popup.classList.contains('show')) {
    closePopup();
  }
});

// 장르 칩 (Pop만 활성화)
document.querySelectorAll('[data-genre]').forEach(chip => {
  chip.addEventListener('click', () => {
    if (chip.style.opacity === '0.45') return; // 비활성
    document.querySelectorAll('[data-genre]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});

// ════════════════════════════════════════════
// 10. 초기화
// ════════════════════════════════════════════
buildPiano();
renderHistory();
</script>
